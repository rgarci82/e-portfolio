<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ruben Garcia</title>
    <link rel="stylesheet" href="./styles.css" />
    <script
      src="https://kit.fontawesome.com/c8e4d183c2.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <section id="about-me">
      <nav>
        <div class="personal__logo">Ruben Garcia</div>
        <ul class="nav__link--list">
          <li>
            <a
              href=""
              class="nav_link--anchor link_hover-effect link_hover-effect--black"
              >Languages</a
            >
          </li>
          <li>
            <a
              href=""
              class="nav_link--anchor link_hover-effect link_hover-effect--black"
              >Projects</a
            >
          </li>
          <li>
            <a href="" class="nav_link--anchor nav_link--anchor--primary"
              >Contact</a
            >
          </li>
        </ul>
      </nav>
      <div class="flex flex-1">
        <div class="about-me__info row">
          <div class="about-me__info--container">
            <figure class="about-me__picture--mask">
              <img
                src="./assests/eport.jpg"
                class="about-me__picture"
                alt="picture of me"
              />
            </figure>
            <h1 class="about-me__info--title">
              Hey! I'm <span class="text--purple">Ruben Garcia</span>
            </h1>
            <p class="about-me__info--para">
              I'm a
              <strong class="text--purple">frontend software engineer</strong>
              with a strong passion for building responsive and performant web
              applications with great user exeriences that positively impacts
              the world.
            </p>
            <div class="about-me__links">
              <a href="" class="about-me__link">
                <i class="fab fa-linkedin-in"></i>
              </a>
              <a href="" class="about-me__link">
                <i class="fab fa-github"></i>
              </a>
              <a href="" class="about-me__link">
                <i class="far fa-envelope"></i>
              </a>
              <a href="" class="about-me__link">
                <i class="fas fa-file-pdf"></i>
              </a>
            </div>
          </div>
          <figure class="about-me__img--container">
            <img
              src="./assests/undraw_website.svg"
              class="about-me__img"
              alt=""
            />
          </figure>
        </div>
      </div>
    </section>
  </body>
</html>
